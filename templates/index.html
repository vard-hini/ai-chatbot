<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ bot_name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      background: #1a1a2e;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 { font-size: 1.2rem; color: #7c83fd; letter-spacing: 1px; }
    header span { font-size: 0.85rem; color: #888; }
    header a { color: #ff6b6b; font-size: 0.8rem; text-decoration: none; margin-left: 16px; }
    #chat-window {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.55; font-size: 0.95rem; }
    .msg.user { background: #7c83fd; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.bot  { background: #1e1e36; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a4a; }
    .msg .meta { font-size: 0.72rem; color: #aaa; margin-top: 6px; }
    #input-area {
      padding: 16px 24px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      display: flex; gap: 10px;
    }
    #msg-input {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      border: 1px solid #2a2a4a; background: #0f0f1a;
      color: #e0e0f0; font-size: 0.95rem; outline: none;
    }
    #msg-input:focus { border-color: #7c83fd; }
    button {
      padding: 12px 22px; border-radius: 12px; border: none;
      background: #7c83fd; color: #fff; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #5a63e8; }
    #clear-btn { background: #2a2a4a; font-size: 0.8rem; padding: 8px 14px; }
    #clear-btn:hover { background: #ff6b6b; }
    .typing { color: #7c83fd; font-style: italic; font-size: 0.88rem; }
  </style>
</head>
<body>
<header>
  <h1>🤖 {{ bot_name }}</h1>
  <div>
    <span>Logged in as <strong>{{ username }}</strong></span>
    <button id="clear-btn" onclick="clearHistory()">🗑 Clear</button>
    <a href="/logout">Logout</a>
  </div>
</header>

<div id="chat-window"></div>

<div id="input-area">
  <input id="msg-input" type="text" placeholder="Type a message..." autofocus
         onkeydown="if(event.key==='Enter') sendMessage()" />
  <button onclick="sendMessage()">Send ➤</button>
</div>

<script>
  const win = document.getElementById('chat-window');

  // Load history on page open
  window.onload = async () => {
    const res = await fetch('/history');
    const data = await res.json();
    data.history.forEach(m => addBubble(m.role === 'user' ? 'user' : 'bot',
      m.content, m.intent, m.timestamp));
    scrollBottom();
  };

  function addBubble(role, text, intent = '', ts = '') {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = role === 'user' ? 'You' : '🤖 Bot';
    div.innerHTML = `<div>${escHtml(text)}</div>
      <div class="meta">${label}${intent ? ' · ' + intent : ''}${ts ? ' · ' + ts.slice(0,16) : ''}</div>`;
    win.appendChild(div);
    scrollBottom();
    return div;
  }

  function scrollBottom() { win.scrollTop = win.scrollHeight; }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addBubble('user', msg);

    // Typing indicator
    const typing = document.createElement('div');
    typing.className = 'typing'; typing.textContent = 'NexusAI is thinking...';
    win.appendChild(typing); scrollBottom();

    try {
      const res = await fetch('/chat', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      win.removeChild(typing);
      addBubble('bot', data.reply || data.error, data.intent);
    } catch (e) {
      win.removeChild(typing);
      addBubble('bot', 'Connection error. Please try again.');
    }
  }

  async function clearHistory() {
    if (!confirm('Clear all chat history?')) return;
    await fetch('/clear', { method: 'POST' });
    win.innerHTML = '';
  }
</script>
</body>
</html>
